<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master of the Seven Seas</title>
    <style>
        :root {
            --pirate-gold: #ffdb64;
            --leather: #5d4037;
        }

        body {
            /* Changed Font to Georgia */
            font-family: Georgia, 'Times New Roman', Times, serif;
            background-image: url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            /* Changed Text Color to #ffdb64 */
            color: var(--pirate-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        h1 {
            color: var(--pirate-gold);
            text-shadow: 3px 3px 8px #000;
            margin: 30px 0;
            font-size: clamp(1.8rem, 10vw, 4rem);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 4px;
        }

        .table-container {
            background: none;
            padding: 10px;
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid rgba(255, 219, 100, 0.3);
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: rgba(0, 0, 0, 0.6);
            color: var(--pirate-gold);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 1px solid var(--pirate-gold);
            border-radius: 4px;
            font-size: 1.1rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            /* Input text color matches the theme */
            color: var(--pirate-gold);
            font-family: Georgia, serif;
            font-weight: bold;
        }

        .pirate-name {
            font-weight: bold;
            color: var(--pirate-gold);
            background: rgba(0,0,0,0.5);
            min-width: 130px;
            cursor: text;
        }

        .total-cell {
            font-weight: 900;
            color: #ff5252; /* Kept red for contrast on the winning score */
            font-size: 1.4rem;
            background: rgba(0,0,0,0.5);
        }

        .reset-btn {
            background-color: #8b0000;
            color: var(--pirate-gold);
            padding: 15px 45px;
            border: 2px solid var(--pirate-gold);
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: Georgia, serif;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
            margin: 40px 0;
            transition: transform 0.1s;
        }

        .reset-btn:active {
            transform: translateY(3px);
        }

        /* --- MOBILE RESPONSIVE STYLES --- */
        @media screen and (max-width: 800px) {
            thead { display: none; }

            table, tbody, tr, td {
                display: block;
                width: 100%;
            }

            tr {
                margin-bottom: 30px;
                border: 1px solid var(--pirate-gold);
                background: rgba(0,0,0,0.6);
                border-radius: 12px;
                overflow: hidden;
            }

            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: none;
                border-bottom: 1px solid rgba(255, 219, 100, 0.1);
                padding: 12px 20px;
                box-sizing: border-box;
            }

            /* Round labels for mobile */
            td::before {
                content: attr(data-label);
                font-weight: bold;
                color: var(--pirate-gold);
                text-transform: uppercase;
                font-size: 0.9rem;
            }

            .pirate-name {
                background-color: rgba(255, 219, 100, 0.15);
                justify-content: center;
                font-size: 1.5rem;
                padding: 15px;
            }
            
            .pirate-name::before { content: ""; }
        }
    </style>
</head>
<body>

    <h1>Master of the Seven Seas</h1>

    <div class="table-container">
        <table id="scoreTable">
