<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master of the Seven Seas</title>
    <style>
        :root {
            --pirate-gold: #ffdb64;
            --deep-sea: #1a1a1a; /* Fallback background color */
        }

        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            /* Fallback color + Background Image */
            background-color: var(--deep-sea); 
            background-image: url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            color: var(--pirate-gold);
        }

        h1 {
            color: var(--pirate-gold);
            text-shadow: 3px 3px 8px #000;
            margin: 30px 0;
            font-size: clamp(1.8rem, 10vw, 4rem);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 4px;
        }

        .table-container {
            /* Added a subtle dark tint so the table is ALWAYS visible */
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 219, 100, 0.2);
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
            backdrop-filter: blur(5px); /* Blurs background for a glass effect */
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid rgba(255, 219, 100, 0.3);
            padding: 12px;
            text-align: center;
        }

        th {
            color: var(--pirate-gold);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 2px #000;
        }

        input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 1px solid var(--pirate-gold);
            border-radius: 4px;
            font-size: 1.1rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            color: var(--pirate-gold);
            font-family: Georgia, serif;
            font-weight: bold;
        }

        .pirate-name {
            font-weight: bold;
            color: var(--pirate-gold);
            background: rgba(0,0,0,0.3);
            min-width: 130px;
        }

        .total-cell {
            font-weight: 900;
            color: #ff5252;
            font-size: 1.4rem;
            text-shadow: 1px 1px 2px #000;
        }

        .reset-btn {
            background-color: #8b0000;
            color: var(--pirate-gold);
            padding: 15px 45px;
            border: 2px solid var(--pirate-gold);
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: Georgia, serif;
            font-weight: bold;
            margin: 40px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
        }

        /* MOBILE VIEW */
        @media screen and (max-width: 800px) {
            thead { display: none; }
            table, tbody, tr, td { display: block; width: 100%; }
            tr {
                margin-bottom: 30px;
                border: 1px solid var(--pirate-gold);
                background: rgba(0,0,0,0.7);
                border-radius: 12px;
                overflow: hidden;
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: none;
                border-bottom: 1px solid rgba(255, 219, 100, 0.1);
                padding: 12px 20px;
                box-sizing: border-box;
            }
            td::before {
                content: attr(data-label);
                font-weight: bold;
                color: var(--pirate-gold);
                text-transform: uppercase;
                font-size: 0.8rem;
            }
            .pirate-name {
                background-color: rgba(255, 219, 100, 0.2);
                justify-content: center;
                font-size: 1.5rem;
            }
            .pirate-name::before { content: ""; }
        }
    </style>
</head>
<body>

    <h1>Master of the Seven Seas</h1>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Pirate</th>
                    <th>Round 1</th>
                    <th>Round 2</th>
                    <th>Round 3</th>
                    <th>Round 4</th>
                    <th>Round 5</th>
                    <th>Round 6</th>
                    <th>Round 7</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="pirateBody">
                </tbody>
        </table>
    </div>

    <button class="reset-btn" onclick="resetGame()">RESET GAME</button>

    <script>
        // Use an array to manage the rounds
        const rounds = ["Round 1", "Round 2", "Round 3", "Round 4", "Round 5", "Round 6", "Round 7"];

        // Build the table when the page loads
        function buildTable() {
            const tbody = document.getElementById('pirateBody');
            let html = "";

            for (let i = 1; i <= 8; i++) {
                html += `<tr class="pirate-row">
                    <td class="pirate-name" contenteditable="true">Pirate ${i}</td>`;
                
                rounds.forEach(rd => {
                    html += `<td data-label="${rd}"><input type="number" class="score-input" value="0" oninput="updateTotals()"></td>`;
                });

                html += `<td data-label="TOTAL" class="total-cell">0</td></tr>`;
            }
            tbody.innerHTML = html;
        }

        function updateTotals() {
            const rows = document.querySelectorAll('.pirate-row');
            rows.forEach(row => {
                const inputs = row.querySelectorAll('.score-input');
                let total = 0;
                inputs.forEach(input => {
                    total += parseInt(input.value) || 0;
                });
                row.querySelector('.total-cell').textContent = total;
            });
        }

        function resetGame() {
            if (confirm("Are ye sure ye want to scrub the decks?")) {
                const inputs = document.querySelectorAll('.score-input');
                inputs.forEach(input => input.value = 0);
                updateTotals();
            }
        }

        // Trigger the build
        buildTable();
    </script>

</body>
</html>
