<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master of the Seven Seas</title>
    <style>
        :root {
            --gold: #d4af37;
            --ink: #ffffff; /* Changed to white for better visibility on images */
            --leather: #5d4037;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            color: var(--ink);
            /* Subtle shadow on all text for readability */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        h1 {
            color: var(--gold);
            text-shadow: 3px 3px 6px #000;
            margin: 30px 0;
            font-size: clamp(1.8rem, 10vw, 4rem);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 4px;
        }

        .table-container {
            /* Tan block removed */
            background: none;
            border: none;
            box-shadow: none;
            padding: 10px;
            width: 100%;
            max-width: 1000px;
            box-sizing: border-box;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid rgba(212, 175, 55, 0.4); /* Faded gold borders */
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: rgba(93, 64, 55, 0.8); /* Semi-transparent leather */
            color: var(--gold);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Styling inputs to be readable against background */
        input[type="number"] {
            width: 55px;
            padding: 8px;
            border: 1px solid var(--gold);
            border-radius: 4px;
            font-size: 1.1rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: bold;
        }

        .pirate-name {
            font-weight: bold;
            color: var(--gold);
            background: rgba(0,0,0,0.3);
            min-width: 120px;
        }

        .total-cell {
            font-weight: 900;
            color: #ff5252; /* Bright red for the final score */
            font-size: 1.3rem;
            background: rgba(0,0,0,0.3);
        }

        .reset-btn {
            background-color: #b71c1c;
            color: white;
            padding: 15px 45px;
            border: 2px solid var(--gold);
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin: 40px 0;
            transition: transform 0.1s;
        }

        .reset-btn:active {
            transform: translateY(3px);
        }

        /* --- MOBILE RESPONSIVE STYLES --- */
        @media screen and (max-width: 600px) {
            thead { display: none; }

            table, tbody, tr, td {
                display: block;
                width: 100%;
            }

            tr {
                margin-bottom: 25px;
                border: 1px solid var(--gold);
                background: rgba(0,0,0,0.4); /* Dark translucent backing for mobile cards */
                border-radius: 8px;
            }

            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: none;
                border-bottom: 1px solid rgba(212, 175, 55, 0.2);
                padding: 12px 20px;
                box-sizing: border-box;
            }

            td::before {
                content: attr(data-label);
                font-weight: bold;
                color: var(--gold);
                text-shadow: none;
            }

            .pirate-name {
                background-color: rgba(212, 175, 55, 0.2);
                justify-content: center;
                font-size: 1.4rem;
            }
            
            .pirate-name::before { content: ""; }
        }
    </style>
</head>
<body>

    <h1>Master of the Seven Seas</h1>

    <div class="table-container">
        <table id="scoreTable">
            <thead>
                <tr>
                    <th>Pirate</th>
                    <th>Rd 1</th>
                    <th>Rd 2</th>
                    <th>Rd 3</th>
                    <th>Rd 4</th>
                    <th>Rd 5</th>
                    <th>Rd 6</th>
                    <th>Rd 7</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <script>
                    const rounds = ["Rd 1", "Rd 2", "Rd 3", "Rd 4", "Rd 5", "Rd 6", "Rd 7"];
                    for (let i = 1; i <= 8; i++) {
                        let rowsHtml = `<tr class="pirate-row">
                            <td class="pirate-name" contenteditable="true">Pirate ${i}</td>`;
                        
                        rounds.forEach(rd => {
                            rowsHtml += `<td data-label="${rd}"><input type="number" class="score-input" value="0" oninput="updateTotals()"></td>`;
                        });

                        rowsHtml += `<td data-label="TOTAL" class="total-cell">0</td></tr>`;
                        document.write(rowsHtml);
                    }
                </script>
            </tbody>
        </table>
    </div>

    <button class="reset-btn" onclick="resetGame()">RESET GAME</button>

    <script>
        function updateTotals() {
            const rows = document.querySelectorAll('.pirate-row');
            rows.forEach(row => {
                const inputs = row.querySelectorAll('.score-input');
                let total = 0;
                inputs.forEach(input => {
                    total += parseInt(input.value) || 0;
                });
                row.querySelector('.total-cell').textContent = total;
            });
        }

        function resetGame() {
            if (confirm("Are ye sure ye want to scrub the decks?")) {
                const inputs = document.querySelectorAll('.score-input');
                inputs.forEach(input => input.value = 0);
                updateTotals();
            }
        }
    </script>

</body>
</html>
