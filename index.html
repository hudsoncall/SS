<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master of the Seven Seas</title>
    <style>
        :root {
            --pirate-gold: #ffdb64;
            --deep-sea: #1a1a1a;
        }

        /* The Fix: Create a dedicated background layer */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            will-change: transform;
        }

        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
            background-color: var(--deep-sea); 
            margin: 0;
            padding: 10px;
            color: var(--pirate-gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Styling for the new header image */
        .main-header-img {
            max-width: 90%; /* Ensures it fits on mobile screens */
            width: auto;
            height: auto;
            max-height: 150px; /* Prevents it from getting too huge on large monitors */
            margin-top: 15px; /* Breathing room at the top */
            margin-bottom: -10px; /* Pulls the 'h1' title a bit closer */
            object-fit: contain; /* Keeps aspect ratio safe */
        }

        h1 {
            color: var(--pirate-gold);
            text-shadow: 3px 3px 8px #000;
            margin: 20px 0 30px 0; /* Adjusted margins to fit with image */
            font-size: clamp(1.8rem, 10vw, 3.5rem); /* Slightly smaller max size to accommodate image */
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 4px;
        }

        .table-container {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 219, 100, 0.2);
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid rgba(255, 219, 100, 0.3);
            padding: 12px;
            text-align: center;
        }

        th {
            color: var(--pirate-gold);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 2px #000;
        }

        input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 1px solid var(--pirate-gold);
            border-radius: 4px;
            font-size: 1.1rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            color: var(--pirate-gold);
            font-family: Georgia, serif;
            font-weight: bold;
        }

        .pirate-name {
            font-weight: bold;
            color: var(--pirate-gold);
            background: rgba(0,0,0,0.3);
            min-width: 130px;
        }

        .total-cell {
            font-weight: 900;
            color: #ff5252;
            font-size: 1.4rem;
            text-shadow: 1px 1px 2px #000;
        }

            color: var(--pirate-gold);
