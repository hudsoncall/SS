<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master of the Seven Seas</title>
    <style>
        :root {
            --pirate-gold: #ffdb64;
            --deep-sea: #1a1a1a;
        }

        /* 1. FIXED BACKGROUND (iPhone & Android Fix) */
        #bg-fixed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: var(--deep-sea);
            z-index: -100; /* Extremely far back */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Georgia, serif;
            color: var(--pirate-gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 2. CONTENT CONTAINER */
        .main-container {
            position: relative;
            z-index: 1; /* Forces content to the front */
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            box-sizing: border-box;
        }

        .header-img {
            max-width: 90%;
            height: auto;
            max-height: 150px;
            margin-bottom: 10px;
        }

        h1 {
            text-shadow: 3px 3px 8px #000;
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 4px;
            margin: 10px 0 30px 0;
        }

        /* 3. TABLE STYLES */
        .table-box {
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid var(--pirate-gold);
            border-radius: 12px;
            width: 100%;
            overflow-x: auto; /* Scroll horizontally on small desktops */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 600px; /* Prevents squishing */
        }

        th, td {
            border: 1px solid rgba(255, 219, 100, 0.3);
            padding: 12px 5px;
            text-align: center;
        }

        th {
            text-transform: uppercase;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
        }

        input[type="number"] {
            width: 50px;
            padding: 8px;
            border: 1px solid var(--pirate-gold);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.5);
            color: var(--pirate-gold);
            font-family: Georgia, serif;
            font-weight: bold;
            text-align: center;
        }

        .pirate-name {
            font-weight: bold;
            min-width: 100px;
            background: rgba(255, 219, 100, 0.1);
        }

        .total-cell {
            font-weight: bold;
            color: #ff5252;
            font-size: 1.2rem;
        }

        .reset-btn {
            background-color: #8b0000;
            color: var(--pirate-gold);
            padding: 15px 40px;
            border: 2px solid var(--pirate-gold);
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: Georgia, serif;
            font-weight: bold;
            margin: 40px 0;
        }

        /* 4. MOBILE LAYOUT (Cards) */
        @media screen and (max-width: 700px) {
            .table-box { border: none; background: none; backdrop-filter: none; }
            table, thead, tbody, tr, td { display: block; width: 100%; }
            thead { display: none; }
            tr {
                background: rgba(0, 0, 0, 0.8);
                border: 2px solid var(--pirate-gold);
                border-radius: 10px;
                margin-bottom: 25px;
                overflow: hidden;
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: none;
                border-bottom: 1px solid rgba(255, 219, 100, 0.1);
                padding: 12px 15px;
                box-sizing: border-box;
            }
            td::before {
                content: attr(data-label);
                font-weight: bold;
                font-size: 0.8rem;
            }
            .pirate-name {
                background: var(--pirate-gold);
                color: #000;
                justify-content: center;
                font-size: 1.3rem;
                text-shadow: none;
            }
            .pirate-name::before { content: ""; }
        }
    </style>
</head>
<body>

    <div id="bg-fixed"></div>

    <div class="main-container">
        <img src="header.png" alt="Header" class="header-img">
        
        <h1>Master of the Seven Seas</h1>

        <div class="table-box">
            <table>
                <thead>
                    <tr>
                        <th>Pirate</th>
                        <th>Round 1</th><th>Round 2</th><th>Round 3</th>
                        <th>Round 4</th><th>Round 5</th><th>Round 6</th>
                        <th>Round 7</th><th>Total</th>
                    </tr>
                </thead>
                <tbody id="pBody">
