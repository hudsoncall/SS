<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirate Game Scoreboard</title>
    <style>
        :root {
            --gold: #d4af37;
            --parchment: rgba(255, 245, 220, 0.9);
            --ink: #2c1e16;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('background.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--ink);
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px #000;
            margin-top: 20px;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .table-container {
            background-color: var(--parchment);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 5px solid #5d4037;
            margin-bottom: 30px;
            overflow-x: auto;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #8d6e63;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #5d4037;
            color: var(--gold);
            font-weight: bold;
        }

        input[type="number"] {
            width: 50px;
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: transparent;
            font-weight: bold;
            text-align: center;
        }

        .pirate-name {
            font-weight: bold;
            font-style: italic;
            background: rgba(0,0,0,0.05);
        }

        .total-cell {
            font-weight: 800;
            color: #b71c1c;
            font-size: 1.1rem;
        }

        .reset-btn {
            background-color: #b71c1c;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px #801111;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background-color: #d32f2f;
        }

        .reset-btn:active {
            box-shadow: 0 0 #801111;
            transform: translateY(4px);
        }
    </style>
</head>
<body>

    <h1>Pirate Scoreboard</h1>

    <div class="table-container">
        <table id="scoreTable">
            <thead>
                <tr>
                    <th>Pirate</th>
                    <th>Rd 1</th>
                    <th>Rd 2</th>
                    <th>Rd 3</th>
                    <th>Rd 4</th>
                    <th>Rd 5</th>
                    <th>Rd 6</th>
                    <th>Rd 7</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <script>
                    for (let i = 1; i <= 8; i++) {
                        document.write(`
                            <tr class="pirate-row">
                                <td class="pirate-name" contenteditable="true">Pirate ${i}</td>
                                <td><input type="number" class="score-input" value="0" oninput="updateTotals()"></td>
                                <td><input type="number" class="score-input" value="0" oninput="updateTotals()"></td>
                                <td><input type="number" class="score-input" value="0" oninput="updateTotals()"></td>
                                <td><input type="number" class="score-input" value="0" oninput="updateTotals()"></td>
                                <td><input type="number" class="score-input" value="0" oninput="updateTotals()"></td>
                                <td><input type="number" class="score-input" value="0" oninput="updateTotals()"></td>
                                <td><input type="number" class="score-input" value="0" oninput="updateTotals()"></td>
                                <td class="total-cell">0</td>
                            </tr>
                        `);
                    }
                </script>
            </tbody>
        </table>
    </div>

    <button class="reset-btn" onclick="resetGame()">RESET GAME</button>

    <script>
        function updateTotals() {
            const rows = document.querySelectorAll('.pirate-row');
            
            rows.forEach(row => {
                const inputs = row.querySelectorAll('.score-input');
                let total = 0;
                
                inputs.forEach(input => {
                    total += parseInt(input.value) || 0;
                });
                
                row.querySelector('.total-cell').textContent = total;
            });
        }

        function resetGame() {
            if (confirm("Are ye sure ye want to scrub the decks and reset the scores?")) {
                const inputs = document.querySelectorAll('.score-input');
                inputs.forEach(input => input.value = 0);
                updateTotals();
            }
        }
    </script>

</body>
</html>
