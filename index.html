<style>
body {
  font-family: 'Trebuchet MS', serif;
  background: url('background.png') no-repeat center center fixed;
  background-size: cover;
  color: #2b1d0e;
  margin: 0;
  padding: 15px;
}

/* Dark overlay so table is readable */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

h1 {
  text-align: center;
  color: #f5e6c8;
  text-shadow: 2px 2px 6px black;
  margin-bottom: 15px;
}

<div style="text-align:center; color:#f5e6c8; margin-bottom:10px;">
  Seven Seas Scorecard
</div>

/* Table container */
.table-container {
  overflow-x: auto;
}

/* Table styling */
table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(245, 222, 179, 0.95);
  border-radius: 12px;
  overflow: hidden;
}

/* Header row */
th {
  background: linear-gradient(#3b2a1a, #1f140c);
  color: #f5e6c8;
  font-weight: bold;
  padding: 10px;
  border: 2px solid #5c3b1e;
}

/* Cells */
td {
  border: 2px solid #5c3b1e;
  padding: 6px;
}

/* Inputs */
input {
  width: 100%;
  background: transparent;
  border: none;
  text-align: center;
  font-size: 16px;
  color: #2b1d0e;
}

/* Player name style */
.name-input {
  font-weight: bold;
}

/* Total column */
.total {
  font-weight: bold;
  background: #d4af37;
  color: #000;
}

/* Button */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(#d4af37, #b8962e);
  color: black;
  font-weight: bold;
  font-size: 16px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.4);
}
</style>
