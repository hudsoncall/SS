<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master of the Seven Seas</title>
    <style>
        :root {
            --pirate-gold: #ffdb64;
            --deep-sea: #1a1a1a;
        }

        /* FIXED BACKGROUND LAYER */
        #bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: var(--deep-sea); /* Fallback */
            z-index: -1; /* Ensures it stays behind */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
            color: var(--pirate-gold);
            min-height: 100vh;
        }

        /* CONTENT WRAPPER */
        .content-wrapper {
            position: relative;
            z-index: 1; /* Forces content to the front */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .main-header-img {
            max-width: 90%;
            height: auto;
            max-height: 150px;
            margin-top: 20px;
            object-fit: contain;
        }

        h1 {
            color: var(--pirate-gold);
            text-shadow: 3px 3px 8px #000;
            margin: 15px 0 25px 0;
            font-size: clamp(1.8rem, 10vw, 3.5rem);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 4px;
        }

        .table-container {
            background: rgba(0, 0, 0, 0.7); /* Slightly darker for better contrast */
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 219, 100, 0.3);
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
            /* Support for older Safari blur */
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid rgba(255, 219, 100, 0.2);
            padding: 12px 8px;
            text-align: center;
        }

        th {
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-shadow: 2px 2px 2px #000;
        }

        input[type="number"] {
            width: 55px;
            padding: 8px;
            border: 1px solid var(--pirate-gold);
            border-radius: 4px;
            font-size: 1.1rem;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            color: var(--pirate-gold);
            font-family: Georgia, serif;
            font-weight: bold;
        }

        .pirate-name {
            font-weight: bold;
            background: rgba(255, 219, 100, 0.05);
            min-width: 120px;
        }

        .total-cell {
            font-weight: 900;
            color: #ff5252;
            font-size: 1.3rem;
        }

        .reset-btn {
            background-color: #8b0000;
            color: var(--pirate-gold);
            padding: 15px 40px;
            border: 2px solid var(--pirate-gold);
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: Georgia, serif;
            font-weight: bold;
            margin: 40px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.7);
        }

        /* MOBILE VIEW */
        @media screen and (max-width: 800px) {
            thead { display: none; }
            table, tbody, tr, td { display: block; width: 100%; }
            tr {
                margin-bottom: 25px;
                border: 1px solid var(--pirate-gold);
                background: rgba(0,0,0,0.7);
                border-radius: 12px;
                overflow: hidden;
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border: none;
                border-bottom: 1px solid rgba(255, 219, 100, 0.1);
                padding: 12px 15px;
                box-sizing: border-box;
            }
            td::before {
                content: attr(data-label);
                font-weight: bold;
                font-size: 0.75rem;
            }
            .pirate-name {
                background-color: rgba(255, 219, 100, 0.15);
                justify-content: center;
                font-size: 1.4rem;
            }
            .pirate-name::before { content: ""; }
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div class="content-wrapper">
        <img src="header.png" alt="Seven Seas Header" class="main-header-img">
        
        <h1>Master of the Seven Seas</h1>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Pirate</th>
                        <th>Round 1</th>
                        <th>Round 2</th>
                        <th>Round 3</th>
                        <th>Round 4</th>
                        <th>Round 5</th>
                        <th>Round 6</th>
                        <th>Round 7</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="pirateBody"></tbody>
            </table>
        </div>

        <button class="reset-btn" onclick="resetGame()">RESET GAME</button>
    </div>

    <script>
        const rounds = ["Round 1", "Round 2", "Round 3", "Round 4", "Round 5", "Round 6", "Round 7"];

        function buildTable() {
            const tbody = document.getElementById('pirateBody');
            if(!tbody) return;
            
            let html = "";
            for (let i = 1; i <= 8; i++) {
                html += `<tr class="pirate-row">
                    <td class="pirate-name" contenteditable="true">Pirate ${i}</td>`;
                rounds.forEach(rd => {
                    html += `<td data-label="${rd}"><input type="number" class="score-input" value="0" oninput="updateTotals()"></td>`;
                });
                html += `<td data-label="TOTAL" class="total-cell">0</td></tr>`;
            }
            tbody.innerHTML = html;
        }
